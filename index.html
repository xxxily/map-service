<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <title>混合地图</title>
  </head>
  <body>
    <div id="map-search-mod">
      <label for="tipinput">请输入关键字：</label>
      <input id="tipinput" autocomplete="off">
    </div>

    <ul id="map-menu" aria-label="地图工具">
      <li><button type="button" data-action="toggleLayerControl" aria-label="切换图层">☰</button></li>
      <li><button type="button" data-action="toggleSearchMode" aria-label="搜索地点">⌕</button></li>
      <li><button type="button" data-action="updatePosition" aria-label="定位当前位置">⌖</button></li>
    </ul>

    <div id="map"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
