<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f766e">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" href="/pwa-icon.svg">
    <title>混合地图</title>
    <script type="module" crossorigin src="/assets/index-C51wCr_G.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-D58GUCxn.css">
  </head>
  <body>
    <div id="map-search-mod">
      <label for="tipinput">请输入关键字：</label>
      <input id="tipinput" autocomplete="off">
    </div>

    <div id="guideline-toolbar" class="guideline-toolbar" hidden>
      <span class="guideline-toolbar-title">📐 辅助线模式</span>
      <button type="button" class="guideline-btn" data-guideline-action="undo" title="撤销 (Ctrl+Z)">撤销</button>
      <button type="button" class="guideline-btn" data-guideline-action="redo" title="重做 (Ctrl+Y)">重做</button>
      <button type="button" class="guideline-btn danger" data-guideline-action="clear" title="清除所有辅助线">清除所有</button>
      <button type="button" class="guideline-btn" data-guideline-action="exit" title="退出辅助线模式">退出</button>
    </div>

    <ul id="map-menu" aria-label="地图工具">
      <li><button type="button" data-action="resetBearing" aria-label="重置方向" id="reset-bearing-btn" style="display: none;"><span class="compass-icon">🧭</span></button></li>
      <li><button type="button" data-action="toggleLayerControl" aria-label="更多工具与图层" aria-expanded="false" title="更多工具与图层">☰</button></li>
      <li data-more-item><button type="button" data-action="toggleKmlPanel" aria-label="KML管理" title="KML 数据管理">📂</button></li>
      <li data-more-item><button type="button" data-action="toggleGuidelineMode" aria-label="辅助线管理" title="地图辅助线">📐</button></li>
      <li><button type="button" data-action="toggleSearchMode" aria-label="搜索地点">⌕</button></li>
      <li><button type="button" data-action="updatePosition" aria-label="定位当前位置">⌖</button></li>
      <li data-more-item><button type="button" data-action="openAdmin" aria-label="管理后台">⚙</button></li>
    </ul>

    <!-- KML 控制面板 -->
    <aside id="kml-panel" class="kml-panel" hidden>
      <div class="kml-panel-header">
        <h2>KML 数据管理</h2>
        <button type="button" class="kml-close-btn" data-action="closeKmlPanel" aria-label="关闭">×</button>
      </div>
      <div class="kml-panel-body">
        <div class="kml-import-section" id="kml-import-dropzone">
          <span class="kml-import-icon">📂</span>
          <span class="kml-import-text">点击或拖拽 KML 文件导入</span>
          <span class="kml-import-subtext">仅支持标准 .kml 格式</span>
          <input type="file" id="kml-file-input" accept=".kml" style="display: none;">
        </div>
        <button type="button" class="kml-create-file-btn" data-kml-action="create-file">新建 KML 文件</button>
        <label class="kml-import-option">
          <input type="checkbox" id="kml-coordinate-correction" checked>
          <span>导入后按高德底图坐标纠偏显示</span>
        </label>
        <div class="kml-files-list" id="kml-files-list">
          <!-- 动态载入列表 -->
        </div>
      </div>
    </aside>

    <div id="map"></div>
    <div id="app-version" aria-label="当前版本"></div>
    <main id="admin-root" hidden></main>
  </body>
</html>
